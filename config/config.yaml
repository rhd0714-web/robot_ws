  serial_port: "/dev/ttyACM0"
  baudrate: 1000000
  on_connect_fail: warn
  timeout_ms: 10
  angle_limit_min: -150.0
  angle_limit_max: 150.0

  motors:
    - finger: index
      motor1_id: 1
      motor1_offset_rad: 0.12217304763960307
