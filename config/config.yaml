# AmazingHand 로봇 제어 설정 파일
# ============================================================

# 실행 모드: simulation / hardware / both
mode: both

# -----------------------------------------------------------
# Vision Node 설정
# -----------------------------------------------------------
vision:
  camera_index: 0
  frame_width: 640
  frame_height: 480
  fps: 30
  mediapipe_model_complexity: 0
  min_detection_confidence: 0.7
  min_tracking_confidence: 0.5
  deadband_bend: 0.002
  deadband_side: 0.002

  # world_landmarks 기반 캘리브레이션 (단위: 미터)
  # hand_calib.py 실행하면 자동으로 이 값이 업데이트됨
  # vision_node는 5초마다 이 값을 자동으로 리로드함 (재시작 불필요)
  fingers:
    index:
      bend_range: [-0.01, 0.08]
      spread_range: [-0.03, 0.03]
    middle:
      bend_range: [-0.01, 0.09]
      spread_range: [-0.02, 0.02]
    ring:
      bend_range: [-0.01, 0.08]
      spread_range: [-0.03, 0.03]
    thumb:
      bend_range: [0.00, 0.07]
      spread_range: [-0.04, 0.04]

# -----------------------------------------------------------
# Driver Node 설정
# -----------------------------------------------------------
driver:
  filter_alpha: 0.15
  bend_range_deg: [100.0, -30.0]
  side_range_deg: [-20.0, 20.0]
  thumb_side_range_deg: [0.0, 45.0]

  fingers:
    index:
      motor1_offset: 0.0
      motor2_offset: 0.0
      invert_side: true
    middle:
      motor1_offset: 0.0
      motor2_offset: 0.0
      invert_side: true
    ring:
      motor1_offset: 0.0
      motor2_offset: 0.0
      invert_side: true
    thumb:
      motor1_offset: 0.0
      motor2_offset: 0.0
      invert_side: false

# -----------------------------------------------------------
# MuJoCo 시뮬레이션 설정
# -----------------------------------------------------------
mujoco:
  xml_path: "/home/user/robot_ws/AmazingHand-main/Demo/AHSimulation/AHSimulation/AH_Left/mjcf/robot.xml"
  target_fps: 60

